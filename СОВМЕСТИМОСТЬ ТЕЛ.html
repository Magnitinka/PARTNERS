<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Кармическая таронумерология – Калькулятор совместимости</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0b2b2f 0%, #091c24 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 12px;
            color: #eef4ff;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1, h2, h3 {
            color: #ffd966;
            text-align: center;
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            margin-bottom: 20px;
            color: #b8d0e0;
        }
        .flex {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(10, 40, 50, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 20px 16px;
            border: 1px solid rgba(255, 180, 70, 0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #ffecb3;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            background: #0a1a2a;
            border: 1px solid #3e8e7a;
            border-radius: 48px;
            color: white;
            -webkit-appearance: none;
        }
        button {
            background: linear-gradient(90deg, #ffb347, #ff8c1a);
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e2a2e;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.1s;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.98);
        }
        .result-table {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 280px;
        }
        th, td {
            border: 1px solid rgba(255, 220, 100, 0.5);
            padding: 8px 4px;
            vertical-align: middle;
            text-align: center;
        }
        th {
            background: rgba(255, 220, 100, 0.2);
            color: #ffecb3;
        }
        .karmic-row {
            background-color: #b34e4e80 !important;
            font-weight: bold;
        }
        .highlight-yellow {
            background-color: #ffaa33cc !important;
            color: #1a2a2a !important;
            font-weight: bold;
        }
        .highlight-unsolved {
            background-color: #f39c12cc !important;
            font-weight: bold;
        }
        .note {
            font-size: 0.65rem;
            text-align: center;
            color: #aaa;
            margin-top: 15px;
        }
        @media (max-width: 550px) {
            body {
                padding: 8px;
            }
            .card {
                padding: 14px;
            }
            th, td {
                padding: 6px 3px;
                font-size: 0.7rem;
            }
            h1 {
                font-size: 1.3rem;
            }
            .result-table {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ КАРМИЧЕСКАЯ ТАРОНУМЕРОЛОГИЯ ✨</h1>
    <div class="sub">Расчёт совместимости по датам рождения</div>

    <div class="flex">
        <div class="card">
            <h2>👨 Мужчина</h2>
            <div class="input-group">
                <label>📅 Дата рождения</label>
                <input type="date" id="manDate" value="1989-06-04">
            </div>
        </div>
        <div class="card">
            <h2>👩 Женщина</h2>
            <div class="input-group">
                <label>📅 Дата рождения</label>
                <input type="date" id="womanDate" value="1985-03-08">
            </div>
        </div>
    </div>
    <button id="calcBtn">🔮 РАССЧИТАТЬ СОВМЕСТИМОСТЬ 🔮</button>
    <div id="results"></div>
    <div class="note">Для дней 23–31 используется дополнительный аркан (Да2). Кармичность – по ДА, МА, ОПВ1–3, КУ3, КБ. КУ1, КУ2, КУ4 в таблицах (не маркеры).</div>
</div>

<script>
    // ----- Базовые функции -----
    function toArcane(num) {
        if (num === 0) return 22;
        let r = num;
        while (r > 22) r -= 22;
        while (r < 1) r += 22;
        return r;
    }
    function digitSum(num) {
        return String(Math.abs(num)).split('').reduce((s, d) => s + parseInt(d, 10), 0);
    }
    function getDoubleDA(day) {
        const map = {
            23: { main: 5, additional: 1 },
            24: { main: 6, additional: 2 },
            25: { main: 7, additional: 3 },
            26: { main: 8, additional: 4 },
            27: { main: 9, additional: 5 },
            28: { main: 1, additional: 6 },
            29: { main: 2, additional: 7 },
            30: { main: 3, additional: 8 },
            31: { main: 4, additional: 9 }
        };
        return map[day] || null;
    }

    function calcPerson(birthDate) {
        const [year, month, day] = birthDate.split('-').map(Number);
        if (isNaN(year) || isNaN(month) || isNaN(day)) return null;
        const doubleDA = getDoubleDA(day);
        const mainNumber = doubleDA ? doubleDA.main : toArcane(day);
        const additionalNumber = doubleDA ? doubleDA.additional : null;
        const ma = toArcane(month);
        const ga = toArcane(digitSum(year));

        function compute(daVal) {
            const cz = toArcane(daVal + ma + ga);
            const opv = toArcane(Math.abs(daVal - ma));
            const tp = toArcane(daVal + ma);
            const kb = toArcane(Math.abs(ma - ga));
            const ku1 = toArcane(cz + opv);
            const ku2 = toArcane(daVal + opv);
            const ku3 = toArcane(Math.abs(daVal - ga));
            const ku4 = toArcane(ga + cz);
            return { cz, opv, tp, kb, ku1, ku2, ku3, ku4 };
        }

        const mainCalc = compute(mainNumber);
        const secondaryCalc = additionalNumber ? compute(additionalNumber) : null;
        const kbCommon = toArcane(Math.abs(ma - ga));
        return { mainNumber, additionalNumber, ma, ga, main: mainCalc, secondary: secondaryCalc, kbCommon };
    }

    const arcaneNames = {
        1:"Маг",2:"Верховная Жрица",3:"Императрица",4:"Император",
        5:"Иерофант",6:"Влюблённые",7:"Колесница",8:"Правосудие",
        9:"Отшельник",10:"Колесо Фортуны",11:"Сила",12:"Повешенный",
        13:"Смерть",14:"Умеренность",15:"Дьявол",16:"Башня",
        17:"Звезда",18:"Луна",19:"Солнце",20:"Страшный Суд",
        21:"Мир",22:"Шут"
    };
    function nameA(a) { return arcaneNames[a] || a; }

    function calcCompatibility(man, woman) {
        const mMain = man.mainNumber, wMain = woman.mainNumber;
        const mAdd = man.additionalNumber, wAdd = woman.additionalNumber;
        const mMa = man.ma, wMa = woman.ma;
        const mGa = man.ga, wGa = woman.ga;

        const da3 = toArcane(mMain + wMain);
        let da3_2 = null;
        if (mAdd !== null && wAdd !== null) da3_2 = toArcane(mAdd + wAdd);
        const ma3 = toArcane(mMa + wMa);
        const ga3 = toArcane(mGa + wGa);

        const emMeetMan = toArcane(mMain + (mMain + wMain));
        const emMeetWoman = toArcane(wMain + (mMain + wMain));
        const unsolvedMeet = toArcane(Math.abs(emMeetMan - emMeetWoman));

        let emMeetMan2 = null, emMeetWoman2 = null, unsolvedMeet2 = null;
        if (mAdd !== null && wAdd !== null) {
            const da3_2sum = mAdd + wAdd;
            emMeetMan2 = toArcane(mAdd + da3_2sum);
            emMeetWoman2 = toArcane(wAdd + da3_2sum);
            unsolvedMeet2 = toArcane(Math.abs(emMeetMan2 - emMeetWoman2));
        }

        const emLiveMan = toArcane(mMa + (mMa + wMa));
        const emLiveWoman = toArcane(wMa + (mMa + wMa));
        const unsolvedLive = toArcane(Math.abs(emLiveMan - emLiveWoman));

        const emBreakMan = toArcane(mGa + (mGa + wGa));
        const emBreakWoman = toArcane(wGa + (mGa + wGa));
        const unsolvedBreak = toArcane(Math.abs(emBreakMan - emBreakWoman));

        const czCommon = toArcane(man.main.cz + woman.main.cz);
        const tpCommon = toArcane(man.main.tp + woman.main.tp);
        const unsolvedCZ = toArcane(Math.abs(man.main.cz - woman.main.cz));
        const unsolvedTP = toArcane(Math.abs(man.main.tp - woman.main.tp));

        const opv1Man = man.main.opv, opv2Man = man.secondary?.opv ?? null, opv3Man = man.kbCommon;
        const opv1Woman = woman.main.opv, opv2Woman = woman.secondary?.opv ?? null, opv3Woman = woman.kbCommon;

        const opvCommon1 = toArcane(opv1Man + opv1Woman);
        const opvCommon2 = (opv2Man !== null && opv2Woman !== null) ? toArcane(opv2Man + opv2Woman) : null;
        const opvCommon3 = toArcane(opv3Man + opv3Woman);

        return {
            da3, da3_2, ma3, ga3,
            emMeetMan, emMeetWoman, unsolvedMeet,
            emMeetMan2, emMeetWoman2, unsolvedMeet2,
            emLiveMan, emLiveWoman, unsolvedLive,
            emBreakMan, emBreakWoman, unsolvedBreak,
            czCommon, tpCommon, unsolvedCZ, unsolvedTP,
            opv1Man, opv2Man, opv3Man, opv1Woman, opv2Woman, opv3Woman,
            opvCommon1, opvCommon2, opvCommon3,
            man, woman
        };
    }

    function getAllKarmicMarkers(man, woman, compat) {
        const markers = [];
        const mMain = man.mainNumber, wMain = woman.mainNumber;
        const mMa = man.ma, wMa = woman.ma;
        const mKu3 = man.main.ku3, wKu3 = woman.main.ku3;
        const da3 = compat.da3;
        const emWoman = compat.emMeetWoman, emMan = compat.emMeetMan;
        const czCommon = compat.czCommon;
        const czMan = man.main.cz, czWoman = woman.main.cz;
        const opvMan = [compat.opv1Man, compat.opv2Man, compat.opv3Man].filter(v => v !== null);
        const opvWoman = [compat.opv1Woman, compat.opv2Woman, compat.opv3Woman].filter(v => v !== null);
        const mKb = man.kbCommon, wKb = woman.kbCommon;

        if (opvMan.includes(czCommon)) markers.push(`⚡ ОПВ мужчины (${czCommon}) совпадает с общей СЗ – кармично для обоих`);
        if (opvWoman.includes(czCommon)) markers.push(`⚡ ОПВ женщины (${czCommon}) совпадает с общей СЗ – кармично для обоих`);
        if (opvMan.includes(czMan)) markers.push(`⚠️ ОПВ мужчины совпадает с его личной СЗ (${czMan}) – активация кармы`);
        if (opvWoman.includes(czWoman)) markers.push(`⚠️ ОПВ женщины совпадает с её личной СЗ (${czWoman}) – активация кармы`);
        if (opvMan.includes(czWoman)) markers.push(`🎭 ОПВ мужчины совпадает с СЗ женщины (${czWoman}) – переброс кармы`);
        if (opvWoman.includes(czMan)) markers.push(`🎭 ОПВ женщины совпадает с СЗ мужчины (${czMan}) – переброс кармы`);

        if (mKu3 === da3) markers.push(`🏛️ КУ3 мужчины (${mKu3}) совпал с крышей Да3 – кармично`);
        if (wKu3 === da3) markers.push(`🏛️ КУ3 женщины (${wKu3}) совпал с крышей Да3 – кармично`);
        if (mKu3 === emWoman) markers.push(`🔄 КУ3 мужчины совпал с эмоцией женщины – она отрабатывает его карму`);
        if (wKu3 === emMan) markers.push(`🔄 КУ3 женщины совпал с эмоцией мужчины – он отрабатывает её карму`);

        const partnerIndicatorsMan = [man.mainNumber, man.ma, compat.opv1Man, compat.opv2Man, compat.opv3Man].filter(v => v !== null);
        const partnerIndicatorsWoman = [woman.mainNumber, woman.ma, compat.opv1Woman, compat.opv2Woman, compat.opv3Woman].filter(v => v !== null);
        if (partnerIndicatorsWoman.includes(mKu3)) markers.push(`🔁 КУ3 мужчины (${mKu3}) совпал с показателем женщины – кармическая связь`);
        if (partnerIndicatorsMan.includes(wKu3)) markers.push(`🔁 КУ3 женщины (${wKu3}) совпал с показателем мужчины – кармическая связь`);
        if (mKu3 === wKu3) markers.push(`🔁 КУ3 совпадает (${mKu3}) – сильная кармическая связь`);

        if (mKb === czCommon) markers.push(`💊 КБ мужчины совпадает с общей СЗ – кармическая болезнь`);
        if (wKb === czCommon) markers.push(`💊 КБ женщины совпадает с общей СЗ – кармическая болезнь`);
        if (mKb === czMan) markers.push(`⚠️ КБ мужчины с его личной СЗ – активация болезни`);
        if (wKb === czWoman) markers.push(`⚠️ КБ женщины с её личной СЗ – активация болезни`);
        if (mKb === czWoman) markers.push(`🎭 КБ мужчины с СЗ женщины – переброс болезни`);
        if (wKb === czMan) markers.push(`🎭 КБ женщины с СЗ мужчины – переброс болезни`);

        if (compat.opv1Man === compat.opv1Woman) markers.push(`🔁 ОПВ1 совпадает (${compat.opv1Man}) – общий узел`);
        if (compat.opv2Man !== null && compat.opv2Woman !== null && compat.opv2Man === compat.opv2Woman) markers.push(`🔁 ОПВ2 совпадает (${compat.opv2Man}) – общий узел`);
        if (compat.opv3Man === compat.opv3Woman) markers.push(`🔁 ОПВ3 (КБ) совпадает – общая кармическая болезнь`);

        return [...new Map(markers.map(m => [m, m])).values()];
    }

    function rowWithAdd(label, mainVal, addVal) {
        let main = (typeof mainVal === 'number') ? mainVal : (mainVal || '—');
        let add = (typeof addVal === 'number') ? addVal : (addVal === null || addVal === undefined ? '—' : addVal);
        return `<tr><th style="text-align:left">${label}</th><td>${main !== '—' ? main+' ('+nameA(main)+')' : '—'}</td><td>${add !== '—' ? add+' ('+nameA(add)+')' : '—'}</td></tr>`;
    }

    function isKarmicRow(rowName, compat, man, woman) {
        const czCommon = compat.czCommon;
        const da3 = compat.da3;
        const mKu3 = man.main.ku3, wKu3 = woman.main.ku3;
        const opvMan = [compat.opv1Man, compat.opv2Man, compat.opv3Man].filter(v => v !== null);
        const opvWoman = [compat.opv1Woman, compat.opv2Woman, compat.opv3Woman].filter(v => v !== null);
        const mKb = man.kbCommon, wKb = woman.kbCommon;
        if (rowName === 'czCommon') return opvMan.includes(czCommon) || opvWoman.includes(czCommon) || mKu3 === czCommon || wKu3 === czCommon || mKb === czCommon || wKb === czCommon;
        if (rowName === 'da3') return mKu3 === da3 || wKu3 === da3;
        if (rowName === 'opvCommon1') return compat.opv1Man === czCommon || compat.opv1Woman === czCommon;
        if (rowName === 'opvCommon2') return compat.opv2Man !== null && compat.opv2Woman !== null && (compat.opv2Man === czCommon || compat.opv2Woman === czCommon);
        if (rowName === 'opvCommon3') return compat.opv3Man === czCommon || compat.opv3Woman === czCommon;
        if (rowName === 'emMeetMan') return mKu3 === compat.emMeetWoman;
        if (rowName === 'emMeetWoman') return wKu3 === compat.emMeetMan;
        return false;
    }

    function render() {
        const manDate = document.getElementById('manDate').value;
        const womanDate = document.getElementById('womanDate').value;
        if (!manDate || !womanDate) {
            document.getElementById('results').innerHTML = '<div class="result-table" style="color:#ffaa88;">⚠️ Выберите даты рождения.</div>';
            return;
        }
        const man = calcPerson(manDate);
        const woman = calcPerson(womanDate);
        if (!man || !woman) {
            document.getElementById('results').innerHTML = '<div class="result-table" style="color:#ffaa88;">❌ Ошибка в датах.</div>';
            return;
        }
        const compat = calcCompatibility(man, woman);
        const allMarkers = getAllKarmicMarkers(man, woman, compat);

        // Таблицы
        const manHtml = `<h3>👨 Мужчина</h3>
        <table>
            <tr><th>Показатель</th><th>Основной</th><th>Да2 (доп.)</th></tr>
            ${rowWithAdd("ДА (день)", man.mainNumber, man.additionalNumber)}
            ${rowWithAdd("МА (месяц)", man.ma, null)}
            ${rowWithAdd("ГА (год)", man.ga, null)}
            ${rowWithAdd("СЗ", man.main.cz, man.secondary?.cz ?? null)}
            ${rowWithAdd("ОПВ1", man.main.opv, man.secondary?.opv ?? null)}
            ${rowWithAdd("ТП", man.main.tp, man.secondary?.tp ?? null)}
            ${rowWithAdd("КБ (ОПВ3)", man.kbCommon, null)}
            ${rowWithAdd("КУ1", man.main.ku1, man.secondary?.ku1 ?? null)}
            ${rowWithAdd("КУ2", man.main.ku2, man.secondary?.ku2 ?? null)}
            ${rowWithAdd("КУ3", man.main.ku3, man.secondary?.ku3 ?? null)}
            ${rowWithAdd("КУ4", man.main.ku4, man.secondary?.ku4 ?? null)}
        </table>`;

        const womanHtml = `<h3>👩 Женщина</h3>
        <table>
            <tr><th>Показатель</th><th>Основной</th><th>Да2 (доп.)</th></tr>
            ${rowWithAdd("ДА (день)", woman.mainNumber, woman.additionalNumber)}
            ${rowWithAdd("МА (месяц)", woman.ma, null)}
            ${rowWithAdd("ГА (год)", woman.ga, null)}
            ${rowWithAdd("СЗ", woman.main.cz, woman.secondary?.cz ?? null)}
            ${rowWithAdd("ОПВ1", woman.main.opv, woman.secondary?.opv ?? null)}
            ${rowWithAdd("ТП", woman.main.tp, woman.secondary?.tp ?? null)}
            ${rowWithAdd("КБ (ОПВ3)", woman.kbCommon, null)}
            ${rowWithAdd("КУ1", woman.main.ku1, woman.secondary?.ku1 ?? null)}
            ${rowWithAdd("КУ2", woman.main.ku2, woman.secondary?.ku2 ?? null)}
            ${rowWithAdd("КУ3", woman.main.ku3, woman.secondary?.ku3 ?? null)}
            ${rowWithAdd("КУ4", woman.main.ku4, woman.secondary?.ku4 ?? null)}
        </table>`;

        // Совместимость
        let compatHtml = `<h3>🔗 Анализ совместимости</h3>
        <table>
            <tr><th colspan="3">Общие арканы этапов (крыши)</th></tr>
            <tr><th>Показатель</th><th>Крыша 1 (осн.)</th><th>Крыша 2 (доп.)</th></tr>
            ${rowWithAdd("Да3 (знакомство)", compat.da3, compat.da3_2)}
            ${rowWithAdd("Ма3 (проживание)", compat.ma3, null)}
            ${rowWithAdd("Га3 (разрыв)", compat.ga3, null)}
        </table>
        <br>
        <table>
            <tr><th colspan="4">Эмоции и нерешаемые вопросы</th></tr>
            <tr><th>Этап</th><th>Эмоция мужчины</th><th>Эмоция женщины</th><th>Нерешаемый конфликт</th></tr>
            <tr${isKarmicRow('emMeetMan', compat, man, woman) ? ' class="karmic-row"' : ''}><td>Встреча (Да+Да3)<td>${compat.emMeetMan} (${nameA(compat.emMeetMan)})<td>${compat.emMeetWoman} (${nameA(compat.emMeetWoman)})<td class="highlight-unsolved">${compat.unsolvedMeet} (${nameA(compat.unsolvedMeet)})</tr>
            ${compat.emMeetMan2 !== null ? `<tr${isKarmicRow('emMeetMan2', compat, man, woman) ? ' class="karmic-row"' : ''}><td>Встреча (по Да2)<td>${compat.emMeetMan2} (${nameA(compat.emMeetMan2)})<td>${compat.emMeetWoman2} (${nameA(compat.emMeetWoman2)})<td class="highlight-unsolved">${compat.unsolvedMeet2} (${nameA(compat.unsolvedMeet2)})</tr>` : ''}
            <tr${isKarmicRow('emLiveMan', compat, man, woman) ? ' class="karmic-row"' : ''}><td>Проживание (Ма+Ма3)<td>${compat.emLiveMan} (${nameA(compat.emLiveMan)})<td>${compat.emLiveWoman} (${nameA(compat.emLiveWoman)})<td class="highlight-unsolved">${compat.unsolvedLive} (${nameA(compat.unsolvedLive)})</tr>
            <tr${isKarmicRow('emBreakMan', compat, man, woman) ? ' class="karmic-row"' : ''}><td>Разрыв (Га+Га3)<td>${compat.emBreakMan} (${nameA(compat.emBreakMan)})<td>${compat.emBreakWoman} (${nameA(compat.emBreakWoman)})<td class="highlight-unsolved">${compat.unsolvedBreak} (${nameA(compat.unsolvedBreak)})</tr>
        </table>
        <br>
        <table>
            <tr><th colspan="4">Общие и нерешаемые показатели</th></tr>
            <tr><th>Показатель</th><th>Общие</th><th>Нерешаемые</th><th>Формула</th></tr>
            <tr${isKarmicRow('czCommon', compat, man, woman) ? ' class="karmic-row"' : ''}><td>СЗ (социальная задача)<td>${compat.czCommon} (${nameA(compat.czCommon)})<td class="highlight-unsolved">${compat.unsolvedCZ} (${nameA(compat.unsolvedCZ)})<td>СЗМ+СЗЖ, |СЗМ-СЗЖ|</tr>
            <tr${isKarmicRow('tpCommon', compat, man, woman) ? ' class="karmic-row"' : ''}><td>ТП (точка препятствий)<td>${compat.tpCommon} (${nameA(compat.tpCommon)})<td class="highlight-unsolved">${compat.unsolvedTP} (${nameA(compat.unsolvedTP)})<td>ТПМ+ТПЖ, |ТПМ-ТПЖ|</tr>
            <tr${isKarmicRow('opvCommon1', compat, man, woman) ? ' class="karmic-row"' : ''}><td>ОПВ1<td>${compat.opvCommon1} (${nameA(compat.opvCommon1)})<td class="highlight-unsolved">—<td>ОПВ1М+ОПВ1Ж</tr>
            ${compat.opvCommon2 !== null ? `<tr${isKarmicRow('opvCommon2', compat, man, woman) ? ' class="karmic-row"' : ''}><td>ОПВ2<td>${compat.opvCommon2} (${nameA(compat.opvCommon2)})<td class="highlight-unsolved">—<td>ОПВ2М+ОПВ2Ж</tr>` : ''}
            <tr${isKarmicRow('opvCommon3', compat, man, woman) ? ' class="karmic-row"' : ''}><td>ОПВ3 (КБ)<td>${compat.opvCommon3} (${nameA(compat.opvCommon3)})<td class="highlight-unsolved">—<td>КБМ+КБЖ</tr>
        </table>`;

        const markersHtml = allMarkers.length ?
            `<div class="result-table" style="background:#2a1a2a;"><strong>🌀 КАРМИЧЕСКИЕ МАРКЕРЫ (${allMarkers.length}):</strong><ul style="margin:8px 0 0 20px;">${allMarkers.map(m => `<li>${m}</li>`).join('')}</ul></div>` :
            `<div class="result-table" style="background:#1f3a3a;">🌀 Кармические маркеры не обнаружены.</div>`;

        document.getElementById('results').innerHTML = `
            <div class="result-table">${manHtml}</div>
            <div class="result-table">${womanHtml}</div>
            <div class="result-table">${compatHtml}</div>
            ${markersHtml}
        `;
    }

    document.getElementById('calcBtn').addEventListener('click', render);
    window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
